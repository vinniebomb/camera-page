<!DOCTYPE html>
<html>
<head>
  <title>Hand Detection</title>
  <!-- TensorFlow + MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    body { margin: 0; background: black; }
    video, canvas {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    #loadingOverlay {
      position: absolute;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.8);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:2em;
      z-index:10;
    }
    #letterOverlay {
      position:absolute;
      top:10px; left:50%;
      transform: translateX(-50%);
      font-size:3em;
      color:#00FF00;
      font-weight:bold;
      z-index:10;
    }
  </style>
</head>
<body>

<div id="loadingOverlay">Loading model...</div>
<div id="letterOverlay"></div>
<video id="input_video" autoplay playsinline></video>
<canvas id="output_canvas"></canvas>

<script>
// ===== Main script =====
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const loadingOverlay = document.getElementById('loadingOverlay');
const letterOverlay = document.getElementById('letterOverlay');

let model; 
let worker;

// Initialize everything
async function init() {
  // Load TF model once
  model = await tf.loadLayersModel('./model.json');
  console.log("Model loaded!");
  loadingOverlay.style.display = 'none';

  // Start Web Worker for predictions
  const workerBlob = new Blob([`
    importScripts('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest');
    let model;
    onmessage = async function(e) {
      const { type, inputData } = e.data;
      if(type === 'load') {
        model = await tf.loadLayersModel(inputData);
        postMessage({ type: 'loaded' });
      } else if(type === 'predict' && model) {
        const input = tf.tensor([inputData]);
        const prediction = model.predict(input);
        const index = (await prediction.argMax(1).data())[0];
        input.dispose();
        prediction.dispose();
        postMessage({ type: 'result', index });
      }
    }
  `], {type:'application/javascript'});
  worker = new Worker(URL.createObjectURL(workerBlob));
  worker.postMessage({
  type: 'load',
  inputData: 'https://vinniebomb.github.io/model-stuff-camera-hand/model.json'
});
  worker.onmessage = function(e){
  if(e.data.type==='loaded'){
    loadingOverlay.style.display = 'none'; // hide overlay when model is ready
  } else if(e.data.type==='result'){
    const labels = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
    letterOverlay.textContent = labels[e.data.index];
  }
}

  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
  });

  // Throttle predictions (~5 FPS)
  let lastPredictionTime = 0;
  const predictionInterval = 200;

  hands.onResults(results => {
    canvasCtx.save();
    canvasCtx.clearRect(0,0,canvasElement.width,canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if(results.multiHandLandmarks){
      for(const landmarks of results.multiHandLandmarks){
        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color:'#00FF00', lineWidth:4 });
        drawLandmarks(canvasCtx, landmarks, { color:'#FF0000', lineWidth:2 });

        const now = Date.now();
        if(now - lastPredictionTime > predictionInterval){
          lastPredictionTime = now;
          const inputData = [];
          for(const l of landmarks) inputData.push(l.x, l.y, l.z);
          worker.postMessage({type:'predict', inputData});
        }
      }
    }

    canvasCtx.restore();
  });

  const camera = new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width:1280,
    height:720
  });
  camera.start();
}

init();
</script>

</body>
</html>
