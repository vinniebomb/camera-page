<!DOCTYPE html>
<html>
<head>
  <title>Camera</title>
  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    video {
      width: 90%;
      max-width: 600px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<script>
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    document.getElementById("video").srcObject = stream;
  })
  .catch(() => {
    alert("Camera access denied or unavailable.");
  });
</script>

</body>
</html>
