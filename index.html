<!DOCTYPE html>
<html>
<head>
  <title>Hand Detection</title>
  <!-- TensorFlow + MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    body { margin: 0; background: black; }
    video, canvas {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    #loadingOverlay {
      position: absolute;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.8);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:2em;
      z-index:10;
    }
    #letterOverlay {
      position:absolute;
      top:10px; left:50%;
      transform: translateX(-50%);
      font-size:3em;
      color:#00FF00;
      font-weight:bold;
      z-index:10;
    }
    #popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(0, 0, 0, 0.85);
      color: #00FF00;
      font-size: 5em;
      font-weight: bold;
      padding: 40px 60px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 20;
      pointer-events: none;
    }
    #popup.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
</head>
<body>

<div id="loadingOverlay">Loading model...</div>
<div id="letterOverlay"></div>
<div id="popup"></div>
<video id="input_video" autoplay playsinline></video>
<canvas id="output_canvas"></canvas>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const loadingOverlay = document.getElementById('loadingOverlay');
const letterOverlay = document.getElementById('letterOverlay');
const popup = document.getElementById('popup');

let worker;
let lastLetter = null;
let popupCooldown = false;
let lastPredictionTime = 0;
const predictionInterval = 200;

// ===== Initialize =====
async function init() {
  // Start Web Worker for predictions
  const workerBlob = new Blob([`
    importScripts('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest');
    let model;
    onmessage = async function(e){
      const { type, inputData } = e.data;
      if(type === 'load'){
        model = await tf.loadLayersModel(inputData);
        postMessage({ type:'loaded' });
      } else if(type === 'predict' && model){
        // Convert array back to tensor: [1,224,224,3]
        const input = tf.tensor(inputData);
        const prediction = model.predict(input);
        const index = (await prediction.argMax(1).data())[0];
        input.dispose();
        prediction.dispose();
        postMessage({ type:'result', index });
      }
    }
  `], {type:'application/javascript'});

  worker = new Worker(URL.createObjectURL(workerBlob));
  worker.postMessage({
    type: 'load',
    inputData: 'https://vinniebomb.github.io/model-stuff-camera-hand/model.json'
  });

  worker.onmessage = function(e){
    if(e.data.type === 'loaded'){
      loadingOverlay.style.display = 'none';
      console.log('Model loaded in worker!');
    } else if(e.data.type === 'result'){
      const labels = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
      const detectedLetter = labels[e.data.index];
      // Show popup only if letter changed
      if(detectedLetter !== lastLetter && !popupCooldown){
        lastLetter = detectedLetter;
        showPopup(detectedLetter);
      }
    }
  };

  // ===== MediaPipe Hands =====
  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
  });

  hands.onResults(results => {
    canvasCtx.save();
    canvasCtx.clearRect(0,0,canvasElement.width,canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    // Only predict if a hand is detected and throttle
    if(results.multiHandLandmarks){
      const now = Date.now();
      if(now - lastPredictionTime > predictionInterval){
        lastPredictionTime = now;
        // Capture the current video frame as 224x224 RGB
        const imgTensor = tf.browser.fromPixels(videoElement)
          .resizeNearestNeighbor([224,224])
          .toFloat()
          .expandDims(0);
        worker.postMessage({ type:'predict', inputData: imgTensor.arraySync() });
        imgTensor.dispose();
      }

      for(const landmarks of results.multiHandLandmarks){
        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color:'#00FF00', lineWidth:4 });
        drawLandmarks(canvasCtx, landmarks, { color:'#FF0000', lineWidth:2 });
      }
    }

    canvasCtx.restore();
  });

  // ===== Camera =====
  const camera = new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 1280,
    height: 720
  });
  camera.start();
}

// ===== Popup function =====
function showPopup(letter){
  popup.textContent = letter;
  popup.classList.add('show');
  popupCooldown = true;

  setTimeout(() => { popup.classList.remove('show'); }, 1200);
  setTimeout(() => { popupCooldown = false; }, 1500);
}

init();
</script>

</body>
</html>
