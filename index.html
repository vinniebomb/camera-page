<!DOCTYPE html>
<html>
<head>
  <title>Hand Detection</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    body { margin: 0; background: black; }
    video, canvas {
      position: absolute;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<video id="input_video" autoplay playsinline></video>
<canvas id="output_canvas"></canvas>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');

let model;

// Load the model ONCE before starting the camera
async function loadModel() {
  model = await tf.loadLayersModel('./model.json');
  console.log("Model loaded!");
}
loadModel();

const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {

  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
  canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

  if (results.multiHandLandmarks) {
    for (const landmarks of results.multiHandLandmarks) {
      // Draw landmarks
      drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
      drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2});

      if (model) {
        const input = [];
        for (const landmark of landmarks) {
          input.push(landmark.x, landmark.y, landmark.z);
        }

        // Wrap prediction in tf.tidy() to avoid memory leaks
        const resultIndex = tf.tidy(() => {
          const tensor = tf.tensor([input]);
          const prediction = model.predict(tensor);
          return prediction.argMax(1).dataSync()[0];
        });

        const labels = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
        console.log("Detected letter:", labels[resultIndex]);
      }
    }
  }

  canvasCtx.restore();
});

const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({image: videoElement});
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>
